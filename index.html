<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Panairi i Punës</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("./image1.jpeg.jpeg") no-repeat center center;
      background-size: cover;
      filter: blur(6px);
      transform: scale(1.1);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: -1;
    }

    h1 {
      font-size: 58px;
      margin: 0;
    }

    h2 {
      font-size: 34px;
      margin: 10px 0 20px 0;
      font-weight: normal;
    }

    .subtext {
      font-size: 26px;
      margin-bottom: 45px;
      opacity: 0.9;
    }

    .box {
      border: 2px solid white;
      border-radius: 15px;
      padding: 30px 60px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.05);
    }

    .text {
      font-size: 34px;
      font-weight: bold;
    }

    .check {
      width: 35px;
      height: 35px;
      border: 2px solid white;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    /* 🔥 VETËM KJO U RREGULLUA */
    .active {
      background: #00c853;
      border-color: #00c853;
      color: white;
    }

    .send-btn {
      margin-top: 30px;
      padding: 16px 32px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: black;
      display: none;
    }

    .send-btn.show {
      display: block;
    }

    @media (max-width: 600px) {
      h1 { font-size: 46px; }
      h2 { font-size: 28px; }
      .subtext { font-size: 22px; }
      .text { font-size: 30px; }
      .send-btn { font-size: 18px; }
    }
  </style>
</head>

<body>

  <h1>Panairi i Punës & Karrierës Studentore</h1>
  <h2>Otp Bank</h2>

  <div class="subtext">
    Konfirmo pjesëmarrjen tënde në event
  </div>

  <div class="box" onclick="toggleCheck()">
    <div class="text">U paraqita</div>
    <div id="check" class="check"></div>
  </div>

  <button id="sendBtn" class="send-btn" onclick="sendEmail()">
    Dërgo konfirmimin
  </button>

  <script>
    let selected = false;

    function toggleCheck() {
      const check = document.getElementById("check");
      const btn = document.getElementById("sendBtn");

      selected = !selected;

      if (selected) {
        check.classList.add("active");
        check.innerHTML = "✔";
        btn.classList.add("show");
      } else {
        check.classList.remove("active");
        check.innerHTML = "";
        btn.classList.remove("show");
      }
    }

    function sendEmail() {

      const businessEmail = "Humanresources@otpbank.al";

      const subject = "Pjesëmarrja në Panair";
      const body = "U paraqita";

      const mailtoLink =
      `mailto:${businessEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

      window.location.href = mailtoLink;
    }
  </script>

</body>
</html>
